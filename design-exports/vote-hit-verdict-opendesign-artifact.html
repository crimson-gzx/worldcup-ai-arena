<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>World Cup AI Arena · Vote Hit Verdict</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #080a08;
      --surface: #111510;
      --surface-2: #171d16;
      --ink: #f4f0de;
      --muted: #a19d8d;
      --faint: #d7c891;
      --accent: #d7a832;
      --accent-bright: #f5d879;
      --cool: #62c7ff;
      --line: rgba(245, 216, 121, 0.18);
      --line-strong: rgba(245, 216, 121, 0.42);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 80% 10%, rgba(215, 168, 50, 0.16), transparent 30%),
        radial-gradient(circle at 16% 100%, rgba(98, 199, 255, 0.12), transparent 35%),
        linear-gradient(180deg, #0b0d0a, #070807);
      color: var(--ink);
    }
    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 48px 24px;
    }
    .canvas {
      width: min(1180px, 100%);
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 360px);
      gap: 28px;
      align-items: center;
    }
    .meta {
      display: grid;
      gap: 18px;
      align-content: center;
    }
    .eyebrow {
      margin: 0;
      font: 700 12px/1.2 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--faint);
    }
    h1 {
      margin: 0;
      max-width: 760px;
      font-size: clamp(42px, 7vw, 92px);
      line-height: 0.9;
      letter-spacing: 0;
      text-transform: uppercase;
    }
    .summary {
      margin: 0;
      max-width: 650px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
    }
    .board {
      position: relative;
      border: 1px solid var(--line);
      background:
        linear-gradient(90deg, rgba(245,216,121,0.08) 1px, transparent 1px),
        linear-gradient(0deg, rgba(245,216,121,0.06) 1px, transparent 1px),
        rgba(9, 11, 9, 0.82);
      background-size: 28px 28px;
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.42);
      padding: clamp(18px, 3vw, 32px);
    }
    .vote-feedback {
      position: relative;
      min-height: 236px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: end;
      gap: 10px 24px;
      padding: clamp(26px, 4vw, 42px);
      overflow: hidden;
      isolation: isolate;
      border: 1px solid var(--line-strong);
      background:
        linear-gradient(90deg, rgba(240, 194, 75, 0.17) 0 1px, transparent 1px 100%),
        linear-gradient(0deg, rgba(240, 194, 75, 0.12) 0 1px, transparent 1px 100%),
        radial-gradient(circle at 84% 28%, rgba(240, 194, 75, 0.24), transparent 32%),
        radial-gradient(circle at 0% 100%, rgba(91, 205, 255, 0.13), transparent 34%),
        linear-gradient(135deg, rgba(255,255,255,0.075), rgba(255,255,255,0.02) 46%, rgba(240,194,75,0.13)),
        var(--surface);
      background-size: 22px 22px, 22px 22px, auto, auto, auto, auto;
      box-shadow:
        0 26px 90px -38px rgba(240, 194, 75, 0.95),
        inset 0 0 0 1px rgba(255, 255, 255, 0.08),
        inset 0 -42px 90px rgba(0, 0, 0, 0.26);
    }
    .vote-feedback::before {
      content: "";
      position: absolute;
      inset: 22px 0 auto;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.22), rgba(240,194,75,0.68), transparent);
      animation: scan 2.4s ease-in-out infinite;
      z-index: 0;
    }
    .vote-feedback::after {
      content: "";
      position: absolute;
      right: 24px;
      top: 24px;
      width: 122px;
      height: 122px;
      border-radius: 50%;
      border: 1px solid rgba(240,194,75,0.24);
      background:
        radial-gradient(circle, transparent 54%, rgba(240,194,75,0.14) 55% 58%, transparent 59%),
        conic-gradient(from 30deg, transparent, rgba(240,194,75,0.36), transparent 42%, rgba(91,205,255,0.16), transparent 72%);
      animation: seal 6s linear infinite;
      z-index: 0;
    }
    .vote-hit-aura {
      position: absolute;
      top: 20px;
      right: 18px;
      width: 138px;
      height: 138px;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(255, 255, 255, 0.18) 0 4%, transparent 5%),
        repeating-conic-gradient(from 0deg, rgba(240,194,75,0) 0 8deg, rgba(240,194,75,0.35) 9deg 10deg, transparent 11deg 18deg);
      opacity: 0.24;
      z-index: 1;
    }
    .vote-hit-mark {
      position: absolute;
      top: 55px;
      right: 56px;
      display: grid;
      place-items: center;
      width: 62px;
      height: 62px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.42);
      background:
        radial-gradient(circle at 34% 28%, rgba(255,255,255,0.55), transparent 28%),
        linear-gradient(145deg, var(--accent-bright), var(--accent) 58%, #f5e8b2);
      color: var(--bg);
      font-weight: 900;
      font-size: 32px;
      line-height: 1;
      box-shadow: 0 10px 24px -12px var(--accent), inset 0 0 0 1px rgba(255,255,255,0.28);
      z-index: 3;
    }
    .vote-hit-ribbon {
      position: absolute;
      left: 32px;
      right: 32px;
      bottom: 86px;
      height: 1px;
      background: linear-gradient(90deg, rgba(240,194,75,0.7), rgba(255,255,255,0.34), transparent);
      z-index: 1;
    }
    .kicker,
    .title,
    .detail,
    .metric { position: relative; z-index: 4; }
    .kicker {
      grid-column: 1;
      align-self: start;
      color: var(--faint);
      font: 800 12px/1.2 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }
    .title {
      grid-column: 1;
      padding-right: 120px;
      color: var(--accent-bright);
      font-size: clamp(48px, 8vw, 86px);
      line-height: 0.86;
      text-shadow: 0 0 24px rgba(240, 194, 75, 0.35), 0 22px 50px rgba(0, 0, 0, 0.42);
      text-transform: uppercase;
    }
    .detail {
      grid-column: 1;
      color: color-mix(in srgb, var(--ink) 84%, var(--muted));
      font-style: normal;
      font-size: 15px;
      line-height: 1.5;
    }
    .metric {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-top: 16px;
      padding: 14px 16px;
      border-top: 1px solid rgba(240, 194, 75, 0.28);
      background: linear-gradient(90deg, rgba(240,194,75,0.12), rgba(255,255,255,0.03), transparent);
    }
    .metric b {
      font: 800 11px/1.2 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      letter-spacing: 0.14em;
      color: var(--faint);
    }
    .metric i {
      color: var(--accent-bright);
      font-style: normal;
      font-size: 15px;
      font-weight: 800;
    }
    .phone {
      width: min(100%, 330px);
      justify-self: center;
      padding: 16px;
      border: 1px solid rgba(255,255,255,0.14);
      background: #090a08;
      box-shadow: 0 22px 70px rgba(0,0,0,0.35);
    }
    .phone .vote-feedback {
      min-height: 390px;
      padding: 22px 18px;
    }
    .phone .title {
      padding-right: 62px;
      font-size: 46px;
    }
    .phone .detail { font-size: 13px; }
    .phone .metric {
      align-items: flex-start;
      flex-direction: column;
    }
    .phone .vote-hit-aura {
      width: 92px;
      height: 92px;
    }
    .phone .vote-hit-mark {
      top: 42px;
      right: 38px;
      width: 44px;
      height: 44px;
      font-size: 24px;
    }
    @keyframes scan {
      0% { transform: translateX(-75%); opacity: 0; }
      30% { opacity: 1; }
      100% { transform: translateX(85%); opacity: 0; }
    }
    @keyframes seal {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @media (max-width: 860px) {
      .canvas { grid-template-columns: 1fr; }
      .phone { justify-self: start; }
    }
    @media (max-width: 560px) {
      main { padding: 28px 14px; }
      .board { padding: 12px; }
      .vote-feedback { min-height: 210px; padding: 22px 16px; }
      .title { padding-right: 66px; font-size: 42px; }
      .metric { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <main>
    <section class="canvas">
      <div class="meta">
        <p class="eyebrow">World Cup AI Arena · Correct Vote</p>
        <h1>Verdict Panel</h1>
        <p class="summary">用户赛前投票猜中后的赛后反馈组件。保留深色数据终端气质、克制金色高光、右侧勾选 seal，以及“超越人类 / AI 注单”的成就反馈。</p>
        <div class="board">
          <article class="vote-feedback">
            <i class="vote-hit-aura" aria-hidden="true"></i>
            <i class="vote-hit-mark" aria-hidden="true">✓</i>
            <i class="vote-hit-ribbon" aria-hidden="true"></i>
            <span class="kicker">赛后回看</span>
            <strong class="title">你选中了</strong>
            <em class="detail">赛果 2-0 · 正确选项 墨西哥</em>
            <span class="metric"><b>超越</b><i>30% 人类 / 40% AI注单</i></span>
          </article>
        </div>
      </div>
      <aside class="phone" aria-label="Mobile state">
        <article class="vote-feedback">
          <i class="vote-hit-aura" aria-hidden="true"></i>
          <i class="vote-hit-mark" aria-hidden="true">✓</i>
          <i class="vote-hit-ribbon" aria-hidden="true"></i>
          <span class="kicker">Mobile state</span>
          <strong class="title">Hit</strong>
          <em class="detail">赛果 2-0 · 正确选项 墨西哥</em>
          <span class="metric"><b>Beat</b><i>30% Humans / 40% AI Slips</i></span>
        </article>
      </aside>
    </section>
  </main>
</body>
</html>
